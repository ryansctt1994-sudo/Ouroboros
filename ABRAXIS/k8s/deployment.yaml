---
# ABRAXIS Cathedral-OS — Kubernetes Deployment
# SPDX-License-Identifier: MIT
# Copyright (c) 2025-2026 The Ouroboros Foundation
#
# Apply with:
#   kubectl apply -f ABRAXIS/k8s/deployment.yaml
#
# Exposes the Phase H WebSocket dashboard on port 8765 inside the cluster.
# Use a LoadBalancer or Ingress to expose it externally.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: abraxis-cathedral
  labels:
    app: abraxis-cathedral
    component: phase-h-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: abraxis-cathedral
  template:
    metadata:
      labels:
        app: abraxis-cathedral
        component: phase-h-dashboard
    spec:
      containers:
        - name: cathedral
          image: ghcr.io/aiospandora/abraxis-cathedral:latest
          imagePullPolicy: Always
          args:
            - "--mode"
            - "dashboard"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8765"
            - "--governance-threshold"
            - "0.67"
          ports:
            - name: websocket
              containerPort: 8765
              protocol: TCP
          env:
            - name: RUST_LOG
              value: "ouroboros_cathedral=info"
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            tcpSocket:
              port: 8765
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: 8765
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: abraxis-cathedral
  labels:
    app: abraxis-cathedral
spec:
  selector:
    app: abraxis-cathedral
  ports:
    - name: websocket
      port: 8765
      targetPort: 8765
      protocol: TCP
  type: ClusterIP

---
# Phase I — Autonomous node StatefulSet (one pod per node)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: abraxis-node
  labels:
    app: abraxis-node
    component: phase-i-autonomous
spec:
  serviceName: abraxis-node
  replicas: 3
  selector:
    matchLabels:
      app: abraxis-node
  template:
    metadata:
      labels:
        app: abraxis-node
        component: phase-i-autonomous
    spec:
      containers:
        - name: node
          image: ghcr.io/aiospandora/abraxis-cathedral:latest
          imagePullPolicy: Always
          args:
            - "--mode"
            - "node"
            - "--num-nodes"
            - "1"
            - "--tick-ms"
            - "1000"
            - "--governance-threshold"
            - "0.67"
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: RUST_LOG
              value: "ouroboros_cathedral=info"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
