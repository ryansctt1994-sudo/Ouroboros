; ============================================================================
; AIOS: Ouroboros  |  ue/Symbiont/Config/DefaultEngine.ini
; UE 5.3  —  Steam Online Subsystem + Shipping + Steam Deck defaults
;
; !! BEFORE SHIPPING !!
;   Replace every occurrence of 480 with your real Steam AppID.
;   480 = Spacewar — Valve's public SDK test title (development only).
; ============================================================================

; ----------------------------------------------------------------------------
; Net driver — route all traffic through the Steam datagram relay by default,
; fall back to raw UDP (IpNetDriver) when Steam is unavailable.
; ----------------------------------------------------------------------------
[/Script/Engine.GameEngine]
+NetDriverDefinitions=(DefName="GameNetDriver",DriverClassName="OnlineSubsystemSteam.SteamNetDriver",DriverClassNameFallback="OnlineSubsystemUtils.IpNetDriver")

; ----------------------------------------------------------------------------
; Online Subsystem — select Steam as the default platform service.
; ----------------------------------------------------------------------------
[OnlineSubsystem]
DefaultPlatformService=Steam

; ----------------------------------------------------------------------------
; Steam subsystem
; ----------------------------------------------------------------------------
[OnlineSubsystemSteam]
bEnabled=True
SteamDevAppId=480
; Set to True once you have a real AppID so Steam re-launches through the
; client when the exe is run directly.
bRelaunchInSteam=False
GameServerQueryPort=27015
bVACEnabled=True
; Enable the Steam peer-to-peer socket layer for LAN-free connections.
bAllowP2PPacketRelay=True
; Lobby / session defaults (increase for larger multiplayer sessions)
MaxLobbyMembers=16

; Presence & rich presence
[OnlineSubsystemSteam.OnlinePresenceSteam]
bSendRichPresence=True

; ----------------------------------------------------------------------------
; Online Session interface — lobbies + server browsing
; ----------------------------------------------------------------------------
[/Script/OnlineSubsystemUtils.OnlineSessionClient]
bRegisterSessionOnce=False

; ----------------------------------------------------------------------------
; Net driver connection class
; ----------------------------------------------------------------------------
[/Script/OnlineSubsystemSteam.SteamNetDriver]
NetConnectionClassName="OnlineSubsystemSteam.SteamNetConnection"
; Increase for high-frequency AI-state replication
MaxInternetClientRate=50000
MaxClientRate=50000

; ----------------------------------------------------------------------------
; Achievements / Stats — wired to the Steam Stats & Achievements interface.
; Stat/achievement names must match what is registered in the Steamworks
; developer portal for AppID 480 (or your real AppID).
; ----------------------------------------------------------------------------
[OnlineSubsystemSteam.Stats]
; Set True to flush stats to Steam automatically when the session ends.
bShouldAutoFlushStats=True

; ----------------------------------------------------------------------------
; Renderer — sensible defaults that run well on Steam Deck (RDNA 2 / Vulkan).
; Override per-platform in Config/Windows/ and Config/Linux/.
; ----------------------------------------------------------------------------
[/Script/Engine.RendererSettings]
r.DefaultFeature.Bloom=True
r.DefaultFeature.AmbientOcclusion=True
; TAA (2) gives the best quality/perf ratio on Deck; FXAA (1) for low-end
r.DefaultFeature.AntiAliasing=2
r.ShadowQuality=3
; Lumen software ray-tracing — on by default, GPU cost is acceptable on Deck
r.Lumen.Reflections.Allow=1
r.Lumen.GlobalIllumination.Allow=1

; ----------------------------------------------------------------------------
; Shipping build — crash reporting, logging, symbols
; ----------------------------------------------------------------------------
[/Script/UnrealEd.ProjectPackagingSettings]
; Build configuration for automated CI packaging
Build=Shipping
; Include debug symbols in a separate PDB file (never bundle in depot)
bIncludeDebugFiles=False
; Strip unreferenced content from cooked build
bCompressed=True
; Use chunk-based I/O for faster load times
bShareMaterialShaderCode=True
bSharedMaterialNativeLibraries=True

[CrashReportClient]
CrashReportClientVersion=1.0
; Point this at your own crash-report ingest endpoint, or leave blank to
; disable crash telemetry entirely.
DataRouterUrl=

[Core.Log]
; Shipping: suppress verbose/log channels; keep Warning+ for diagnostics
LogOnlineSubsystem=Warning
LogSteam=Warning
LogNet=Warning
LogTemp=Warning

; ----------------------------------------------------------------------------
; Steam Deck — Proton / Linux Vulkan compatibility flags
; ----------------------------------------------------------------------------
[SystemSettings]
r.AllowStaticLighting=True
bSupportAllShaderPermutations=True
; Force Vulkan shader compilation on Linux/Deck
r.Vulkan.UseRealUBs=1
; Reduce shader permutation explosion
r.Shaders.Optimize=1
; Enable FSR 1 upscaling for Deck battery-life headroom
r.TemporalAA.Upscaler=0
r.Upscale.Quality=3


; ----------------------------------------------------------------------------
; PSO Pipeline Cache — pre-compiles common shaders to eliminate stutter.
; Populate cache/PipelineCaches/ via a warm-up pass before shipping.
; ----------------------------------------------------------------------------
[DevOptions.Shaders]
bAllowAsynchronousShaderCompiling=True

[/Script/Engine.StreamingSettings]
; Reduce hitch budget for level streaming to 4ms (default 5ms)
s.LevelStreamingActorsUpdateTimeLimit=4.0

[/Script/Engine.GarbageCollectionSettings]
; Spread GC over multiple frames to reduce hitches
gc.TimeBetweenPurgingPendingKillObjects=60.0
gc.MaxObjectsNotConsideredByGC=1

; ----------------------------------------------------------------------------
; Steam Cloud — paths that are synced by Steamworks.
; The SaveGames/ subfolder is automatically included by the Steam OSS.
; ----------------------------------------------------------------------------
[/Script/Plugins.OnlineSaveGameModule]
bUsePersistentStorageAlways=True

; ----------------------------------------------------------------------------
; Rich Presence — displayed in Steam friend list and overlay.
; Keys must be registered in Steamworks partner portal:
;   App Admin → Community → Rich Presence
; ----------------------------------------------------------------------------
[OnlineSubsystemSteam.RichPresence]
; %status% is set via IOnlinePresence::SetPresence in AIOSGameInstance.
; Valid localisation tokens registered in Steamworks:
;   #StatusMainMenu, #StatusInGame, #StatusDemoComplete
StatusKey=status
bEnabled=True
