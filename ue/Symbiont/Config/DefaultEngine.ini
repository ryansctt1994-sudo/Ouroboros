; AIOS — Ouroboros | DefaultEngine.ini
; UE5.3 configuration for Steam Online Subsystem

[/Script/Engine.GameEngine]
+NetDriverDefinitions=(DefName="GameNetDriver",DriverClassName="OnlineSubsystemSteam.SteamNetDriver",DriverClassNameFallback="OnlineSubsystemUtils.IpNetDriver")

[OnlineSubsystem]
DefaultPlatformService=Steam

[OnlineSubsystemSteam]
bEnabled=True
; Replace 480 with the real Steam AppID before shipping.
; 480 = Spacewar (Valve SDK test title — valid for development).
SteamDevAppId=480
bRelaunchInSteam=False
GameServerQueryPort=27015
bVACEnabled=True

[/Script/OnlineSubsystemSteam.SteamNetDriver]
NetConnectionClassName="OnlineSubsystemSteam.SteamNetConnection"

; Renderer defaults — forward shading for performance on mid-range hardware
[/Script/Engine.RendererSettings]
r.DefaultFeature.Bloom=True
r.DefaultFeature.AmbientOcclusion=True
r.DefaultFeature.AntiAliasing=2
r.ShadowQuality=3

; Console variables for Steam Deck / Linux compatibility
[SystemSettings]
r.AllowStaticLighting=True
bSupportAllShaderPermutations=True
