; ============================================================================
; AIOS: Ouroboros  |  Config/DefaultGameUserSettings.ini
; Default values for UAIOSGameUserSettings.
; Users can override all of these via the in-game Settings menu.
; ============================================================================

[/Script/Symbiont.AIOSGameUserSettings]
; --- Window ---
; Borderless fullscreen is the Steam-recommended default.
; 0 = Fullscreen, 1 = Windowed, 2 = WindowedFullscreen (borderless)
FullscreenMode=2
LastConfirmedFullscreenMode=2
; Default to native resolution; will be auto-detected on first launch.
ResolutionSizeX=1920
ResolutionSizeY=1080
LastUserConfirmedResolutionSizeX=1920
LastUserConfirmedResolutionSizeY=1080

; --- Active graphics preset ---
; Options: Ultra, High, Medium, Low, SteamDeck, Custom
ActivePreset=High

; --- Accessibility ---
bSubtitlesEnabled=True
SubtitleFontScale=1.0
bSubtitleBackground=True
; ColorblindMode: None, Deuteranopia, Protanopia, Tritanopia
ColorblindMode=None
bReduceMotion=False
bCameraShake=True
FOVScale=1.0
UIScale=1.0

; --- Audio ---
; Volume ranges 0.0–1.0
MasterVolume=1.0
MusicVolume=0.8
SFXVolume=1.0
VoiceVolume=1.0
