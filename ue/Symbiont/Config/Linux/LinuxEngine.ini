; ============================================================================
; AIOS: Ouroboros  |  Config/Linux/LinuxEngine.ini
; Linux / Steam Deck–specific engine overrides.
; ============================================================================

; ----------------------------------------------------------------------------
; Vulkan RHI — the only supported RHI on Steam Deck (SteamOS 3 / Arch Linux).
; ----------------------------------------------------------------------------
[/Script/LinuxTargetPlatform.LinuxTargetSettings]
DefaultGraphicsRHI=DefaultGraphicsRHI_Vulkan
+TargetedRHIs=GLSL_VULKAN_SM5

[/Script/VulkanRHI.VulkanRHISettings]
; Reduce pipeline state object (PSO) cache miss stutter on first play
bEnablePipelineCacheDecompression=True

[SystemSettings]
; Steam Deck APU: RDNA 2 (8 CUs, ~1.0–1.6 GHz).  Target 60 fps at 800p.
r.ScreenPercentage=100
; FSR 1 quality preset for battery-saving mode (toggle via in-game settings)
r.Upscale.Quality=2
; Vulkan-specific: disable frame-rate cap override (Steam Deck handles this)
r.VSyncEditor=0
; Reduce memory pressure — Deck has 16 GB shared CPU/GPU RAM
r.Streaming.PoolSize=1024
r.Streaming.MaxTempMemoryAllowed=256
; Vulkan async compute (supported on RDNA 2)
r.Vulkan.UseRealUBs=1

[CrashReportClient]
bImplicitSend=False
bSendUnattended=False
