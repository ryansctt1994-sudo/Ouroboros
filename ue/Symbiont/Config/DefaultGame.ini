; ============================================================================
; AIOS: Ouroboros  |  ue/Symbiont/Config/DefaultGame.ini
; !! Replace 480 with your real Steam AppID before shipping. !!
; ============================================================================

[/Script/EngineSettings.GeneralProjectSettings]
ProjectID=(A=1794660609,B=1234567890,C=987654321,D=1122334455)
ProjectName=AIOS
ProjectDisplayedTitle=AIOS: Ouroboros
ProjectVersion=1.0.0
CompanyName=AIOSPANDORA
CopyrightNotice=Copyright (c) 2026 AIOSPANDORA. All Rights Reserved.
Description=AI Operating System — Constitutional Symbiont experience powered by the Ouroboros framework.
Homepage=https://github.com/AIOSPANDORA/Ouroboros
SupportContact=https://github.com/AIOSPANDORA/Ouroboros/issues
; bShouldWindowPreserveAspectRatio — preserves 16:9 on Steam Deck
bShouldWindowPreserveAspectRatio=True
; Enable controller / gamepad input by default (required for Steam Deck cert)
bUseMouseForTouch=False

[/Script/GameMapsSettings]
GameDefaultMap=/Game/Maps/AIOS_MainMenu
GameInstanceClass=/Script/Symbiont.AIOSGameInstance
GlobalDefaultGameMode=/Script/Symbiont.AIOSGameMode
; Server travel map for multiplayer sessions
ServerDefaultMap=/Game/Maps/AIOS_MainMenu

[/Script/Engine.GameSession]
MaxPlayers=16

; ----------------------------------------------------------------------------
; UE Packaging — Shipping profile
; These are respected by both the Editor and UAT (UnrealAutomationTool).
; ----------------------------------------------------------------------------
[/Script/UnrealEd.ProjectPackagingSettings]
BlueprintNativizationMethod=Disabled
; Cook all maps listed above by default
+MapsToCook=(FilePath="/Game/Maps/AIOS_MainMenu")
; Pak file compression (Zlib — broadest Steam Runtime compat)
bCompressed=True
; Prevent shipping builds from including editor-only data
bSkipEditorContent=True

; ----------------------------------------------------------------------------
; Steam Achievements scaffold
; Register these IDs in the Steamworks partner portal under AppID 480
; (or your real AppID) → Stats & Achievements.
; ----------------------------------------------------------------------------
[OnlineSubsystemSteam.Achievements]
; First ritual invocation
+Achievement=(Id="ACH_FIRST_RITUAL",bIsStatBased=False)
; Completed all constitutional gates
+Achievement=(Id="ACH_CONSTITUTION_COMPLETE",bIsStatBased=False)
; Reached GGC coefficient 0.85
+Achievement=(Id="ACH_GGC_MAX",bIsStatBased=True,StatId="STAT_GGC",StatThreshold=85)
; Played for 1 hour
+Achievement=(Id="ACH_ONE_HOUR",bIsStatBased=True,StatId="STAT_PLAYTIME_MINUTES",StatThreshold=60)

; Steam Stats (integer counters synced to Steamworks)
+Stat=(Id="STAT_RITUALS_INVOKED",StatType=INT)
+Stat=(Id="STAT_GGC",StatType=INT)
+Stat=(Id="STAT_PLAYTIME_MINUTES",StatType=INT)

