; ============================================================================
; AIOS: Ouroboros  |  Config/Windows/WindowsEngine.ini
; Windows-specific engine overrides (layered on top of DefaultEngine.ini).
; ============================================================================

; ----------------------------------------------------------------------------
; Shipping build — Visual C++ runtime & DirectX redistributables
;
; UE5 packages the VC++ runtime automatically when you cook with UAT.
; The Steam redistributable depot mechanism (SteamInstallScripts) handles
; installation on end-user machines.  See steam/depots/README.md for details.
; ----------------------------------------------------------------------------
[/Script/WindowsTargetPlatform.WindowsTargetSettings]
DefaultGraphicsRHI=DefaultGraphicsRHI_DX12
; Fallback to DX11 on older hardware
+TargetedRHIs=PCD3D_SM6
+TargetedRHIs=PCD3D_SM5
; Enable HDR output for compatible monitors
bEnableHDROutput=False

; ----------------------------------------------------------------------------
; Windows crash reporter — writes minidumps to %LOCALAPPDATA%\AIOS\Saved\Crashes
; ----------------------------------------------------------------------------
[CrashReportClient]
bImplicitSend=False
; Disable automatic upload in Shipping until you configure a crash ingest URL
; in DefaultEngine.ini → [CrashReportClient] → DataRouterUrl
bSendUnattended=False

[SystemSettings]
; D3D12 async compute for better GPU utilisation on modern Windows hardware
r.D3D12.AsyncCommandQueues=1
r.D3D12.SingleThreadDXGI=0
; Enable DLSS/FSR via the UE5 temporal upscaler plugin if installed
r.TemporalAA.Upscaler=0
