name: Universal Reliability Crucible

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
      
      - name: Build and Test
        run: |
          make build
          make test
          
      - name: Scale Verification
        run: |
          ./bin/universal_id generate \
            --context="ci://scale1" \
            --input=<(echo "minimal") \
            --scale=1
          
          ./bin/universal_id collision-test --samples=5000
          
      - name: Generate Manifest
        run: |
          ./bin/universal_id manifest > manifest.json
          echo "MANIFEST_SHA=$(sha256sum manifest.json | cut -d' ' -f1)" >> $GITHUB_ENV
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: universal-reliability-crucible
          path: |
            ./bin/universal_id
            manifest.json
            target/release/
            
  deploy:
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Artifacts
        uses: actions/download-artifact@v3
        with:
          name: universal-reliability-crucible
          
      - name: Deploy Verification
        run: |
          chmod +x ./bin/universal_id
          ./bin/universal_id manifest
          echo "✅ Deployment ready"