; Universal Minimum Configuration (Tier 0)
; Symbiosis of Minimums - Absolute Baseline for iPhone XR (iOS 16+)
;
; Philosophy: Start from the Absolute Minimum and scale up only when
; performance is proven. Never degrade from maximum; always build from baseline.
;
; Target Performance:
; - 30 FPS
; - 2GB RSS
; - 1GB VRAM
; - 2 CPU threads
; - No GPU features

[/Script/Engine.RendererSettings]
; Screen percentage - 50% for minimum quality
r.ScreenPercentage=50

; Texture streaming pool - 128MB minimum
r.Streaming.PoolSize=128

; Limit pool size to VRAM to prevent overallocation
r.Streaming.LimitPoolSizeToVRAM=1

; Texture streaming quality - lowest
r.Streaming.MaxTextureUVDensity=0.5

; Shadow quality - disabled
r.ShadowQuality=0
r.Shadow.MaxResolution=512
r.Shadow.MaxCSMResolution=512

; Mobile shadows - disabled
r.Mobile.Shadows=0
r.Mobile.EnableStaticAndCSMShadowReceivers=0
r.Mobile.EnableMovableLightCSMShaderCulling=0

; Static mesh LOD distance scale - 2.0x (show lower LODs sooner)
r.StaticMeshLODDistanceScale=2.0

; Skeletal mesh LOD bias - prefer lower LODs
r.SkeletalMeshLODBias=2

; View distance scale - reduced
r.ViewDistanceScale=0.7

; Post processing - disabled
r.PostProcessAAQuality=0
r.MotionBlurQuality=0
r.BloomQuality=0
r.LensFlareQuality=0
r.AmbientOcclusionLevels=0

; Reflections - disabled
r.ReflectionMethod=0
r.ReflectionEnvironment=0

; Global illumination - disabled
r.LumenScene.Radiosity=0
r.LumenScene.GlobalIllumination=0

; Mobile-specific optimizations
r.Mobile.AntiAliasing=0
r.Mobile.AmbientOcclusion=0
r.Mobile.AllowDitheredLODTransition=1
r.Mobile.UseHWsRGBEncoding=1

; GPU features - disabled for Tier 0
r.GPUCrashDebugging=0
r.GPUSkin.Limit2BoneInfluences=1

; Memory optimizations
r.Streaming.FullyLoadUsedTextures=0
r.Streaming.UsePerTextureBias=1
r.Streaming.Boost=0

[/Script/Engine.Engine]
; Network quality - minimum
NetClientTicksPerSecond=30

; Physics optimization
bSubstepping=False
MaxSubstepDeltaTime=0.033333

[/Script/Engine.GameEngine]
; Frame rate target - 30 FPS for Tier 0
MaxFPS=30
SmoothedFrameRateRange=(LowerBound=(Type=Inclusive,Value=22),UpperBound=(Type=Exclusive,Value=32))

[/Script/Engine.GarbageCollectionSettings]
; Garbage collection - incremental
gc.IncrementalBeginDestroyEnabled=1
gc.CreateGCClusters=1
gc.MinGCClusterSize=5

; GC timing - spread out to avoid hitches
gc.TimeBetweenPurgingPendingKillObjects=60.0
gc.MaxObjectsInEditor=2048
gc.MaxObjectsInGame=1024

[/Script/Engine.NetworkSettings]
; Network optimizations for mobile
n.VerifyPeer=False
n.MaxRepArraySize=64

[ConsoleVariables]
; Additional console variables for extreme optimization
r.MobileContentScaleFactor=0.5
r.MobileMSAA=1
r.Mobile.DisableVertexFog=1
r.SupportPointLights=0
r.SupportSpotLights=0
r.SupportSkyAtmosphere=0
r.SupportLocalFogVolumes=0
