# ============================================================================
# AIOS: Ouroboros — UE5 Build & Package Preflight
# ============================================================================
# This workflow is intentionally manual-only.
#
# GitHub-hosted runners do not include Unreal Engine. Full UE5 packaging must
# run on self-hosted runners that have Unreal Engine installed and labeled for
# the target platform. This preflight workflow keeps the repository Actions tab
# healthy by ensuring the workflow always has at least one runnable job.
# ============================================================================

name: UE5 Build & Package — Preflight

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      project:
        description: "UE project to inspect"
        required: true
        default: "The_Garden"
        type: choice
        options:
          - The_Garden
          - Symbiont
      configuration:
        description: "Build configuration"
        required: true
        default: "Shipping"
        type: choice
        options:
          - Development
          - DebugGame
          - Shipping
      version:
        description: "Semantic version, for example 0.1.0"
        required: false
        default: ""

jobs:
  preflight:
    name: UE5 workflow preflight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve project path
        id: project
        shell: bash
        run: |
          set -euo pipefail
          case "${{ github.event.inputs.project }}" in
            The_Garden)
              PROJECT_PATH="ue/The_Garden/The_Garden.uproject"
              ;;
            Symbiont)
              PROJECT_PATH="ue/Symbiont/Symbiont.uproject"
              ;;
            *)
              echo "Unknown project: ${{ github.event.inputs.project }}" >&2
              exit 1
              ;;
          esac
          echo "project_path=${PROJECT_PATH}" >> "$GITHUB_OUTPUT"
          echo "Selected project path: ${PROJECT_PATH}"

      - name: Verify repository project files
        shell: bash
        run: |
          set -euo pipefail
          PROJECT_PATH="${{ steps.project.outputs.project_path }}"
          if [ ! -f "${PROJECT_PATH}" ]; then
            echo "Project file not found: ${PROJECT_PATH}" >&2
            echo "This is a preflight failure, not a UE build failure." >&2
            exit 1
          fi
          echo "Project file exists: ${PROJECT_PATH}"
          echo "Configuration: ${{ github.event.inputs.configuration }}"
          echo "Version input: ${{ github.event.inputs.version }}"

      - name: Explain full UE5 packaging requirements
        shell: bash
        run: |
          cat <<'EOF'
          UE5 packaging is intentionally not run on GitHub-hosted runners.

          To restore full packaging, add a separate workflow with self-hosted
          runners labeled by platform, for example:
            runs-on: [self-hosted, Windows, ue5]
            runs-on: [self-hosted, Linux, ue5]
            runs-on: [self-hosted, macOS, ue5]

          Required runner configuration:
            - Unreal Engine installed
            - UE_ROOT configured
            - Git LFS enabled if assets require it
            - Project-specific packaging scripts verified locally
          EOF
