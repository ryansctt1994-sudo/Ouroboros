name: ABRAXIS — Cathedral-OS CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'ABRAXIS/**'
      - 'src/main.rs'
      - 'Cargo.toml'
      - '.github/workflows/abraxis-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'ABRAXIS/**'
      - 'src/main.rs'
      - 'Cargo.toml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/abraxis-cathedral

jobs:
  # ──────────────────────────────────────────────────────────────
  # Python tests (Phase H / Phase I / EDEN-ECS bridge)
  # ──────────────────────────────────────────────────────────────
  python-tests:
    name: Python Tests (Phase H & I)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio
          # Install websockets for Phase H tests
          pip install websockets || true

      - name: Run ABRAXIS unit tests
        run: pytest ABRAXIS/tests/ -v --tb=short

  # ──────────────────────────────────────────────────────────────
  # Rust build & tests (src/main.rs + forge_standalone)
  # ──────────────────────────────────────────────────────────────
  rust-build:
    name: Rust Build & Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build (debug)
        run: cargo build --all

      - name: Run tests
        run: cargo test --all

      - name: Build (release)
        run: cargo build --release --bin ouroboros-cathedral

  # ──────────────────────────────────────────────────────────────
  # Docker build (ABRAXIS image)
  # ──────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [python-tests, rust-build]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ABRAXIS/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
