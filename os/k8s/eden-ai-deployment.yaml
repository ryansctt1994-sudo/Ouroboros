apiVersion: apps/v1
kind: Deployment
metadata:
  name: eden-ai
  namespace: default
  labels:
    app: eden-ai
    version: v1.0.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: eden-ai
  template:
    metadata:
      labels:
        app: eden-ai
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: eden-ai
        image: ghcr.io/aiospandora/eden-ai:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        - containerPort: 9090
          name: metrics
          protocol: TCP
        - containerPort: 50051
          name: grpc
          protocol: TCP
        env:
        - name: EDEN_MODEL_PATH
          value: "/models"
        - name: EDEN_CACHE_SIZE
          value: "100"
        - name: EDEN_LOG_LEVEL
          value: "INFO"
        # Secrets from Kubernetes Secret
        - name: EDEN_API_KEY
          valueFrom:
            secretKeyRef:
              name: eden-secrets
              key: api-key
              optional: true
        - name: TELEMETRY_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: eden-secrets
              key: telemetry-endpoint
              optional: true
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: models
          mountPath: /models
          readOnly: true
        - name: cache
          mountPath: /cache
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: eden-models-pvc
      - name: cache
        emptyDir:
          sizeLimit: 1Gi
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - eden-ai
              topologyKey: kubernetes.io/hostname
