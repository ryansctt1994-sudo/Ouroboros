apiVersion: v1
kind: Secret
metadata:
  name: eden-secrets
  namespace: default
  labels:
    app: eden-ai
type: Opaque
stringData:
  # Replace these with actual values or use external secrets management
  api-key: "your-api-key-here"
  telemetry-endpoint: "telemetry.example.com:50051"
---
apiVersion: v1
kind: Secret
metadata:
  name: eden-tls-cert
  namespace: default
  labels:
    app: eden-ai
type: kubernetes.io/tls
data:
  # Base64-encoded TLS certificate and key
  # Generate with: openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout tls.key -out tls.crt
  # Then: cat tls.crt | base64 -w 0
  tls.crt: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0tCi0tLS0tRU5EIENFUlRJRklDQVRFLS0tLS0K
  tls.key: LS0tLS1CRUdJTiBQUklWQVRFIEtFWS0tLS0tCi0tLS0tRU5EIFBSSVZBVEUgS0VZLS0tLS0K
