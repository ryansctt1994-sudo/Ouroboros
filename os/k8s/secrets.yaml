apiVersion: v1
kind: Secret
metadata:
  name: eden-secrets
  namespace: default
  labels:
    app: eden-ai
type: Opaque
stringData:
  # IMPORTANT: Replace these with actual values before deploying to production
  # Or use external secrets management (HashiCorp Vault, AWS Secrets Manager, etc.)
  api-key: "REPLACE_WITH_ACTUAL_API_KEY"
  telemetry-endpoint: "telemetry.example.com:50051"
---
apiVersion: v1
kind: Secret
metadata:
  name: eden-tls-cert
  namespace: default
  labels:
    app: eden-ai
type: kubernetes.io/tls
stringData:
  # Generate TLS certificate with:
  # openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout tls.key -out tls.crt
  # Then apply with: kubectl create secret tls eden-tls-cert --cert=tls.crt --key=tls.key
  #
  # For production, use cert-manager or your cloud provider's certificate service
  tls.crt: "REPLACE_WITH_ACTUAL_TLS_CERT"
  tls.key: "REPLACE_WITH_ACTUAL_TLS_KEY"
